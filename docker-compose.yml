services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: shopdad_app
    working_dir: /var/www
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ./:/var/www
      - ./storage/app/public:/var/www/storage/app/public
    depends_on:
      - postgres
    networks:
      - shopdad

  nginx:
    image: nginx:1.27-alpine
    container_name: shopdad_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./storage/app/public:/var/www/storage/app/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - shopdad

  postgres:
    image: postgres:17-alpine
    container_name: shopdad_postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-shopdad}
      POSTGRES_USER: ${DB_USERNAME:-shopdad}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5435:5435"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shopdad

volumes:
  postgres_data:

networks:
  shopdad:
    driver: bridge
